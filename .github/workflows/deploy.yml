# GitHub Actions workflow to release a new version and publish to npm.
#
# Uses npm Trusted Publishing (OIDC) — no long-lived npm token required.
# The package must be configured on npmjs.com to allow trusted publishing
# from this workflow (Settings > Publishing > Trusted Publishers).
#
# Required permissions for the workflow's GITHUB_TOKEN:
# - contents: write (to push the release branch and tags)
# - pull-requests: write (to open the release PR)
# - id-token: write (for OIDC npm trusted publishing)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      semver:
        description: 'Version bump to apply'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: minor

concurrency:
  group: ${{ github.workflow }}-cd
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release_metadata.outputs.release_branch }}
      release_version: ${{ steps.release_metadata.outputs.release_version }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Calculate release metadata
        id: release_metadata
        env:
          INPUT_SEMVER: ${{ inputs.semver }}
        run: |
          package_name=$(node -p "require('./package.json').name")
          package_version=$(node -p "require('./package.json').version")
          published_version=$(npm view "$package_name" version 2>/dev/null || echo "$package_version")
          tag_versions=$(git ls-remote --tags origin 'v*' | awk -F/ '{print $3}' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed 's/^v//')

          release_version=$(TAG_VERSIONS="$tag_versions" node - "$package_version" "$published_version" "$INPUT_SEMVER" <<'NODE'
          const [packageVersion, publishedVersion, bump] = process.argv.slice(2);
          const tagVersions = (process.env.TAG_VERSIONS || '').split(/\s+/).filter(Boolean);
          const parse = (value) => value.split('.').map((part) => Number(part));
          const increment = (value, type) => {
            const [major, minor, patch] = parse(value);

            if (type === 'major') {
              return `${major + 1}.0.0`;
            }

            if (type === 'minor') {
              return `${major}.${minor + 1}.0`;
            }

            return `${major}.${minor}.${patch + 1}`;
          };

          const usedVersions = new Set([publishedVersion, ...tagVersions].filter(Boolean));
          let candidateVersion = increment(packageVersion, bump);

          while (usedVersions.has(candidateVersion)) {
            candidateVersion = increment(candidateVersion, bump);
          }

          process.stdout.write(candidateVersion);
          NODE
          )

          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "release_branch=release/v$release_version" >> "$GITHUB_OUTPUT"

      - name: Bump version
        run: npm version ${{ steps.release_metadata.outputs.release_version }} -m "Bump version to %s [skip ci]"

      - name: Push release branch and tag
        run: |
          git checkout -b "${{ steps.release_metadata.outputs.release_branch }}"
          git push origin "HEAD:${{ steps.release_metadata.outputs.release_branch }}" --follow-tags

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.release_metadata.outputs.release_branch }}" \
            --title "chore: release v${{ steps.release_metadata.outputs.release_version }}" \
            --body "Automated release PR for v${{ steps.release_metadata.outputs.release_version }}."

  build:
    name: Build
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_branch }}

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn dist

      - name: Upload artifact
        uses: pagopa/dx/.github/actions/upload-artifact@main
        with:
          bundle_name: Bundle
          file_path: ./dist

  publish:
    name: Publish to npm
    needs:
      - release
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.release_branch }}

      - name: Download artifact
        uses: pagopa/dx/.github/actions/download-artifact@main
        with:
          bundle_name: Bundle
          file_path: ./dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org/"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Publish
        run: npm publish --access public
        working-directory: ./dist
        env:
          NPM_CONFIG_PROVENANCE: true

