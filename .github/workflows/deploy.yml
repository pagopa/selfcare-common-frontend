# GitHub Actions workflow to release a new version and publish to npm.
#
# Uses npm Trusted Publishing (OIDC) — no long-lived npm token required.
# The package must be configured on npmjs.com to allow trusted publishing
# from this workflow (Settings > Publishing > Trusted Publishers).
#
# Required permissions for the workflow's GITHUB_TOKEN:
# - contents: write (to push the release branch and tags)
# - pull-requests: write (to open the release PR)
# - id-token: write (for OIDC npm trusted publishing)

name: Deploy

on:
  workflow_dispatch:
    inputs:
      semver:
        description: 'Version bump to apply'
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: minor

concurrency:
  group: ${{ github.workflow }}-cd
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release_metadata.outputs.release_branch }}
      release_version: ${{ steps.release_metadata.outputs.release_version }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: yarn install --immutable

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Calculate release metadata
        id: release_metadata
        env:
          INPUT_SEMVER: ${{ inputs.semver }}
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const { execSync } = require('node:child_process');
          const packageJson = require('./package.json');

          const bump = process.env.INPUT_SEMVER;
          const semverPattern = /^\d+\.\d+\.\d+$/;
          const parse = (value) => value.split('.').map((part) => Number(part));
          const compare = (left, right) => {
            const [leftMajor, leftMinor, leftPatch] = parse(left);
            const [rightMajor, rightMinor, rightPatch] = parse(right);

            return (
              leftMajor - rightMajor ||
              leftMinor - rightMinor ||
              leftPatch - rightPatch
            );
          };
          const increment = (value, type) => {
            const [major, minor, patch] = parse(value);

            if (type === 'major') {
              return `${major + 1}.0.0`;
            }

            if (type === 'minor') {
              return `${major}.${minor + 1}.0`;
            }

            return `${major}.${minor}.${patch + 1}`;
          };
          const readPublishedVersions = () => {
            try {
              const output = execSync(
                `npm view ${JSON.stringify(packageJson.name)} versions --json`,
                {
                  encoding: 'utf8',
                  stdio: ['ignore', 'pipe', 'ignore'],
                }
              ).trim();

              if (!output) {
                return [];
              }

              const versions = JSON.parse(output);

              return (Array.isArray(versions) ? versions : [versions]).filter((value) =>
                semverPattern.test(value)
              );
            } catch {
              return [];
            }
          };
          const readTagVersions = () => {
            try {
              const output = execSync("git ls-remote --tags origin 'v*'", {
                encoding: 'utf8',
                stdio: ['ignore', 'pipe', 'ignore'],
              }).trim();

              if (!output) {
                return [];
              }

              return output
                .split('\n')
                .map((line) => line.trim().split(/\s+/).pop()?.replace('refs/tags/v', ''))
                .filter((value) => semverPattern.test(value));
            } catch {
              return [];
            }
          };

          const knownVersions = new Set([
            packageJson.version,
            ...readPublishedVersions(),
            ...readTagVersions(),
          ]);
          const baseVersion = [...knownVersions].sort(compare).at(-1) ?? packageJson.version;

          let releaseVersion = increment(baseVersion, bump);

          while (knownVersions.has(releaseVersion)) {
            releaseVersion = increment(releaseVersion, bump);
          }

          console.log(`release_version=${releaseVersion}`);
          console.log(`release_branch=release/v${releaseVersion}`);
          NODE

      - name: Bump version
        run: npm version ${{ steps.release_metadata.outputs.release_version }} -m "Bump version to %s [skip ci]"

      - name: Push release branch and tag
        run: |
          git checkout -b "${{ steps.release_metadata.outputs.release_branch }}"
          git push origin "HEAD:${{ steps.release_metadata.outputs.release_branch }}" --follow-tags

      - name: Open release pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.release_metadata.outputs.release_branch }}" \
            --title "chore: release v${{ steps.release_metadata.outputs.release_version }}" \
            --body "Automated release PR for v${{ steps.release_metadata.outputs.release_version }}."

  build:
    name: Build
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.release_branch }}

      - name: Setup Node.js
        uses: pagopa/dx/.github/actions/node-setup@main

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn dist

      - name: Upload artifact
        uses: pagopa/dx/.github/actions/upload-artifact@main
        with:
          bundle_name: Bundle
          file_path: ./dist

  publish:
    name: Publish to npm
    needs:
      - release
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.release.outputs.release_branch }}

      - name: Download artifact
        uses: pagopa/dx/.github/actions/download-artifact@main
        with:
          bundle_name: Bundle
          file_path: ./dist

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: .node-version
          registry-url: "https://registry.npmjs.org/"

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Publish
        run: npm publish --access public
        working-directory: ./dist
        env:
          NPM_CONFIG_PROVENANCE: true

